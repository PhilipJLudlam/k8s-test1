apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/PhilipJLudlam/k8s-test1
    targetRevision: main
    path: apps/nginx
    helm:
      valueFiles:
      - values.yaml
      parameters: []
      releaseName: nginx
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
